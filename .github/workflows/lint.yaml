name: golangci-lint
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:        
    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: 1.26
    - name: Checkout code
      uses: actions/checkout@v7
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: v2.11.3
        args: --timeout=10m
